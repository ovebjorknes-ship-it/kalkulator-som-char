<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Calculator</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .container { max-width: 600px; margin: 20px auto; padding: 20px; border: 1px solid #ccc; }
        .slider-value { margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Chat Calculator</h1>
        <div>
            <label for="industry">Step 1: Select Industry</label>
            <select id="industry">
                <option value="Bygg og anlegg">Bygg og anlegg</option>
                <option value="Eiendomsdrift/Facility Management">Eiendomsdrift/Facility Management</option>
                <option value="Industri og produksjon">Industri og produksjon</option>
                <option value="Handel/retail">Handel/retail</option>
                <option value="Helse og omsorg">Helse og omsorg</option>
                <option value="Offentlig sektor/kommune">Offentlig sektor/kommune</option>
                <option value="Olje/gass og energi">Olje/gass og energi</option>
                <option value="Transport og logistikk">Transport og logistikk</option>
                <option value="Hotell og restaurant">Hotell og restaurant</option>
                <option value="Landbruk">Landbruk</option>
                <option value="IT og teknologi">IT og teknologi</option>
                <option value="Utdanning">Utdanning</option>
                <option value="Annet">Annet</option>
            </select>
        </div>
        <div>
            <label for="employee-band">Step 2: Choose Employees Band</label>
            <div>
                <input type="radio" name="employee-band" value="1-10" id="band1">
                <label for="band1">1-10</label>
                <input type="radio" name="employee-band" value="11-25" id="band2">
                <label for="band2">11-25</label>
                <input type="radio" name="employee-band" value="26-50" id="band3">
                <label for="band3">26-50</label>
                <input type="radio" name="employee-band" value="51-100" id="band4">
                <label for="band4">51-100</label>
                <input type="radio" name="employee-band" value="101-250" id="band5">
                <label for="band5">101-250</label>
                <input type="radio" name="employee-band" value="250+" id="band6">
                <label for="band6">250+</label>
            </div>
        </div>
        <div>
            <label for="specific-question">Step 3: Industry-Specific Question</label>
            <input type="text" id="specific-question" placeholder="Enter question...">
            <div class="slider-value">
                <input type="range" id="value-slider" min="0" max="200" step="1" value="5">
                <span id="slider-value">5</span>
            </div>
        </div>
    </div>
    <script>
        const employeeBandDefaults = { '1-10': 5, '11-25': 10, '26-50': 20, '51-100': 40, '101-250': 80, '250+': 120 };
        const slider = document.getElementById('value-slider');
        const sliderValueDisplay = document.getElementById('slider-value');
        const employeeBands = document.getElementsByName('employee-band');

        employeeBands.forEach(band => {
            band.addEventListener('change', (event) => {
                slider.value = employeeBandDefaults[event.target.value];
                sliderValueDisplay.textContent = slider.value;
            });
        });

        slider.addEventListener('input', (event) => {
            sliderValueDisplay.textContent = event.target.value;
        });
    </script>
</body>
</html>
