<div class='chat-ui'>
  <div class='hero'>
    <h1>Welcome to the Chat Bot</h1>
  </div>
  <div class='chat-bubbles'>
    <div class='bubble user'>Hello, I need assistance!</div>
    <div class='bubble bot'>Sure! What industry are you in?</div>
  </div>
  <div class='typing-indicator'>
    <span>...</span>
  </div>
  <div class='actions'>
    <label for='industry'>Select Industry:</label>
    <select id='industry'>
      <option value='tech'>Technology</option>
      <option value='finance'>Finance</option>
      <option value='health'>Healthcare</option>
      <!-- More options can be added here -->
    </select>
  </div>
  <div class='employee-band'>
    <label for='employee-band'>Select Employee Band:</label>
    <input type='radio' id='band1' name='employee-band' value='band1'> Band 1
    <input type='radio' id='band2' name='employee-band' value='band2'> Band 2
    <input type='radio' id='band3' name='employee-band' value='band3'> Band 3
  </div>
  <div class='slider' id='industry-slider'>
    <label for='slider'>Industry Slider (Max: 200):</label>
    <input type='range' id='slider' min='0' max='200' value='100'>
  </div>
  <div class='slider' id='purchase-slider'>
    <label for='purchase-volume'>Annual Purchase Volume:</label>
    <input type='range' id='purchase-volume' min='0' max='1000000' step='10000'>
    <p>Range: 0 - 1000000</p>
    <p>Help: Select your purchase volume based on your industry and employee band.</p>
  </div>
  <button id='restart-button'>Restart</button>
</div>
